# =============================================================================
# alembic.ini — Configuración general de Alembic
# =============================================================================
# La URL real de la BD se sobrescribe en alembic/env.py con settings.DATABASE_URL.
# Las revisiones generadas viven en alembic/versions/.
# =============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# Placeholder: env.py reemplaza este valor con el .env / Docker.
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
