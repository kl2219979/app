<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanzasFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { slate: { 850: '#1e293b', 950: '#0f172a' } } } } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="text-slate-100 min-h-screen">
    <div id="toast-container"></div>

    <!-- AUTH -->
    <div id="auth-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-panel w-full max-w-md p-8 rounded-2xl border border-slate-800 shadow-2xl">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="p-2.5 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-xl"><i data-lucide="wallet-cards" class="w-6 h-6 text-white"></i></div>
                    <div>
                        <h1 class="text-xl font-bold text-white">FinanzasFlow</h1>
                        
                    </div>
                </div>
                <button type="button" onclick="returnToLanding()" class="flex items-center gap-2 px-3 py-1.5 text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg transition-colors">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i> Volver
                </button>
            </div>
            <div class="relative flex p-1 bg-slate-900 rounded-xl border border-slate-800 mb-6">
                <div id="auth-tab-pill" class="absolute top-1 bottom-1 left-1 w-[calc(50%-4px)] bg-indigo-500/15 border border-indigo-500/30 rounded-lg transition-transform duration-300 ease-in-out z-0"></div>
                <button type="button" onclick="switchAuthTab('login')" class="relative z-10 flex-1 py-2 text-sm font-semibold text-indigo-300 transition-colors duration-300">Iniciar sesión</button>
                <button type="button" onclick="switchAuthTab('register')" class="relative z-10 flex-1 py-2 text-sm font-semibold text-slate-400 hover:text-slate-200 transition-colors duration-300">Registrarse</button>
            </div>
            <form id="login-form" onsubmit="handleLogin(event)" class="space-y-4">
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Usuario o correo</label><input id="login-username" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Contraseña</label><input type="password" id="login-password" required minlength="8" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Entrar</button>
            </form>
            <form id="register-form" onsubmit="handleRegister(event)" class="space-y-3 hidden">
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Nombres</label><input id="reg-nombres" required class="glass-input w-full px-3 py-2 rounded-xl text-sm"></div>
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Apellidos</label><input id="reg-apellidos" required class="glass-input w-full px-3 py-2 rounded-xl text-sm"></div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Nacimiento</label><input type="date" id="reg-fecha-nacimiento" required class="glass-input w-full px-3 py-2 rounded-xl text-sm"></div>
                    <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Género</label>
                        <select id="reg-genero" required class="glass-input w-full px-3 py-2 rounded-xl text-sm">
                            <option value="masculino">Masculino</option><option value="femenino">Femenino</option><option value="otro">Otro</option>
                        </select>
                    </div>
                </div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Correo</label><input type="email" id="reg-correo" required class="glass-input w-full px-3 py-2 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Usuario</label><input id="reg-usuario" required minlength="3" class="glass-input w-full px-3 py-2 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Contraseña</label><input type="password" id="reg-contrasena" required minlength="8" class="glass-input w-full px-3 py-2 rounded-xl text-sm"></div>
                <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Crear cuenta</button>
            </form>
        </div>
    </div>

    <!-- MFA -->
    <div id="mfa-screen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="glass-panel w-full max-w-sm p-8 rounded-2xl border border-slate-800">
            <h2 class="text-lg font-bold text-white mb-2">Verificación MFA</h2>
            <p class="text-xs text-slate-400 mb-4">Ingresa el código de tu autenticador.</p>
            <form onsubmit="handleMfaVerify(event)" class="space-y-4">
                <input id="mfa-code" required maxlength="8" pattern="[0-9]{6,8}" placeholder="000000" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm tracking-widest text-center">
                <button type="submit" class="w-full py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Verificar</button>
                <button type="button" onclick="cancelMfa()" class="w-full py-2 text-sm text-slate-400">Cancelar</button>
            </form>
        </div>
    </div>

    <!-- APP -->
    <div id="app-shell" class="hidden flex flex-col md:flex-row min-h-screen relative overflow-hidden">
        <div id="mobile-overlay" onclick="toggleMobileMenu(false)" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-30 hidden md:hidden"></div>
        <aside id="app-sidebar" class="fixed inset-y-0 left-0 z-40 w-72 md:w-64 glass-panel flex flex-col justify-between p-6 border-r border-slate-800 transform -translate-x-full transition-transform duration-300 md:sticky md:top-0 md:h-screen md:translate-x-0 overflow-y-auto">
            <div>
                <div class="flex items-center justify-between mb-8">
                    <div class="flex items-center gap-3">
                        <div class="p-2.5 bg-gradient-to-tr from-indigo-500 to-purple-600 rounded-xl"><i data-lucide="wallet-cards" class="w-6 h-6 text-white"></i></div>
                        <div>
                            <h1 class="text-xl font-bold text-white">FinanzasFlow</h1>
                            <span class="text-xs text-indigo-400">Control de Finanzas</span>
                        </div>
                    </div>
                    <button onclick="toggleMobileMenu(false)" class="md:hidden p-1.5 text-slate-400 hover:text-white rounded-lg hover:bg-slate-800/50"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <nav class="space-y-1">
                    <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-link active w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100"><i data-lucide="layout-dashboard" class="w-4 h-4"></i>Panel</button>
                    <button onclick="switchTab('transactions')" id="nav-transactions" class="nav-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100"><i data-lucide="receipt" class="w-4 h-4"></i>Transacciones</button>
                    <button onclick="switchTab('transfers')" id="nav-transfers" class="nav-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100"><i data-lucide="arrow-left-right" class="w-4 h-4"></i>Transferencias</button>
                    <button onclick="switchTab('accounts')" id="nav-accounts" class="nav-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100"><i data-lucide="landmark" class="w-4 h-4"></i>Cuentas</button>
                    <button onclick="switchTab('counterparties')" id="nav-counterparties" class="nav-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100"><i data-lucide="users" class="w-4 h-4"></i>Contrapartes</button>
                    <button onclick="switchTab('budgets')" id="nav-budgets" class="nav-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100"><i data-lucide="pie-chart" class="w-4 h-4"></i>Presupuestos</button>
                    <button onclick="switchTab('catalog')" id="nav-catalog" class="nav-link hidden w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100"><i data-lucide="tags" class="w-4 h-4"></i>Catálogo</button>
                    <button onclick="switchTab('settings')" id="nav-settings" class="nav-link w-full flex items-center gap-3 px-4 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:text-slate-100"><i data-lucide="settings" class="w-4 h-4"></i>Ajustes</button>
                </nav>
            </div>
            <div class="mt-8 pt-6 border-t border-slate-800 space-y-4">
                <div class="flex items-center justify-between text-xs text-slate-400">
                    
                    <span id="api-status" class="flex items-center gap-1.5 text-rose-500 font-medium"><span class="w-2.5 h-2.5 bg-rose-500 rounded-full"></span>Desconectado</span>
                </div>
                <div class="flex items-center gap-3 bg-slate-800/20 p-3 rounded-xl border border-slate-800/50">
                    <div id="user-initials" class="w-9 h-9 rounded-full bg-gradient-to-tr from-purple-500 to-indigo-500 flex items-center justify-center font-bold text-white text-xs">?</div>
                    <div class="flex-1 min-w-0">
                        <h4 id="user-display-name" class="text-xs font-semibold text-slate-200 truncate">Usuario</h4>
                        <span id="user-display-role" class="text-[10px] text-slate-400 truncate block">—</span>
                    </div>
                    <button onclick="handleLogout()" class="p-1.5 hover:bg-slate-800 rounded-lg text-slate-400 hover:text-rose-400"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-h-screen w-full md:w-auto relative">
            <header id="app-header" class="glass-panel px-4 md:px-8 py-4 md:py-5 flex items-center justify-between border-b border-slate-800/50 sticky top-0 z-20">
                <div class="flex items-center gap-3">
                    <button onclick="toggleMobileMenu(true)" class="md:hidden p-2 -ml-2 text-slate-300 hover:text-white hover:bg-slate-800 rounded-lg"><i data-lucide="menu" class="w-6 h-6"></i></button>
                    <div>
                        <h2 id="page-title" class="text-xl md:text-2xl font-bold text-white">Panel de Control</h2>
                        <p id="page-subtitle" class="text-[10px] md:text-xs text-slate-400 mt-0.5">Resumen</p>
                    </div>
                </div>
                <div class="flex items-center gap-2">
                    <button onclick="openAccountModal()" class="hidden sm:flex items-center gap-2 px-3 py-2 border border-slate-700 text-slate-300 hover:bg-slate-800/50 rounded-xl text-sm font-semibold transition-colors"><i data-lucide="landmark" class="w-4 h-4"></i>Cuenta</button>
                    <button onclick="openTransactionModal()" class="flex items-center gap-1.5 md:gap-2 px-3 md:px-4 py-2 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-400 hover:to-purple-500 text-white rounded-xl text-sm font-semibold transition-colors"><i data-lucide="plus" class="w-4 h-4"></i><span class="hidden sm:inline">Transacción</span></button>
                </div>
            </header>
            <div id="router-viewport" class="flex-grow p-4 md:p-8 overflow-y-auto overflow-x-hidden"></div>
        </main>
    </div>

    <!-- TRANSACTION MODAL -->
    <div id="modal-transaction" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div id="modal-transaction-content" class="glass-panel w-full max-w-md p-6 rounded-2xl border border-slate-800 scale-95 max-h-[90vh] overflow-y-auto transition-all">
            <div class="flex justify-between items-center mb-6">
                <h3 id="modal-transaction-title" class="text-lg font-bold text-white">Registrar Transacción</h3>
                <button onclick="closeTransactionModal()" class="p-1.5 text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="transaction-form" onsubmit="saveTransaction(event)" class="space-y-4">
                <input type="hidden" id="trans-id"><input type="hidden" id="trans-type" value="gasto"><input type="hidden" id="trans-medio-pago" value="cuenta">
                <div class="grid grid-cols-2 gap-2 p-1 bg-slate-900 rounded-xl border border-slate-800">
                    <button type="button" id="btn-type-expense" onclick="setFormType('gasto')" class="py-2 text-sm font-semibold rounded-lg bg-rose-500/10 text-rose-400 border border-rose-500/20">Gasto</button>
                    <button type="button" id="btn-type-income" onclick="setFormType('ingreso')" class="py-2 text-sm font-semibold rounded-lg text-slate-400">Ingreso</button>
                </div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Monto</label><input type="number" id="trans-amount" step="0.01" min="0.01" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Medio</label>
                    <div class="grid grid-cols-2 gap-2 p-1 bg-slate-900 rounded-xl border border-slate-800">
                        <button type="button" id="btn-medio-cuenta" onclick="setMedioPago('cuenta')" class="py-2 text-sm font-semibold rounded-lg bg-indigo-500/10 text-indigo-300 border border-indigo-500/20">Cuenta</button>
                        <button type="button" id="btn-medio-efectivo" onclick="setMedioPago('efectivo')" class="py-2 text-sm font-semibold rounded-lg text-slate-400">Efectivo</button>
                    </div>
                </div>
                <div id="wrap-account" class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Cuenta</label><select id="trans-account" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></select></div>
                <div id="wrap-moneda" class="space-y-1.5 hidden"><label class="text-xs font-semibold text-slate-400">Moneda</label><input id="trans-moneda" value="COP" maxlength="10" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Categoría</label><select id="trans-category" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></select></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Subcategoría</label><select id="trans-subcategory" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></select></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Contraparte</label><select id="trans-contraparte" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></select></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Fecha</label><input type="date" id="trans-date" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Descripción</label><input id="trans-description" maxlength="255" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="flex gap-3 pt-2">
                    <button type="button" onclick="closeTransactionModal()" class="flex-1 py-2.5 border border-slate-700 text-slate-300 rounded-xl text-sm">Cancelar</button>
                    <button type="submit" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- BUDGET -->
    <div id="modal-budget" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div id="modal-budget-content" class="glass-panel w-full max-w-sm p-6 rounded-2xl border border-slate-800 scale-95 transition-all">
            <div class="flex justify-between items-center mb-6"><h3 class="text-lg font-bold text-white">Ajustar límite</h3><button onclick="closeBudgetModal()" class="p-1.5 text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <form id="budget-form" onsubmit="saveBudget(event)" class="space-y-4">
                <input type="hidden" id="budget-id">
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Categoría</label><select id="budget-category" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></select></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Límite</label><input type="number" id="budget-limit" step="0.01" min="0.01" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Moneda</label><input id="budget-moneda" value="COP" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="flex gap-3"><button type="button" onclick="closeBudgetModal()" class="flex-1 py-2.5 border border-slate-700 rounded-xl text-sm">Cancelar</button><button type="submit" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Guardar</button></div>
            </form>
        </div>
    </div>

    <!-- ACCOUNT -->
    <div id="modal-account" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div id="modal-account-content" class="glass-panel w-full max-w-sm p-6 rounded-2xl border border-slate-800 scale-95 transition-all">
            <div class="flex justify-between items-center mb-6"><h3 id="modal-account-title" class="text-lg font-bold text-white">Nueva Cuenta</h3><button onclick="closeAccountModal()" class="p-1.5 text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <form id="account-form" onsubmit="saveAccount(event)" class="space-y-4">
                <input type="hidden" id="account-id">
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Banco</label><input id="account-banco" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Tipo</label><input id="account-tipo" required placeholder="ahorros / corriente / digital" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Moneda</label><input id="account-moneda" value="COP" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div id="wrap-account-saldo" class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Saldo inicial</label><input type="number" id="account-saldo" step="0.01" min="0" value="0" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="flex gap-3"><button type="button" onclick="closeAccountModal()" class="flex-1 py-2.5 border border-slate-700 rounded-xl text-sm">Cancelar</button><button type="submit" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Guardar</button></div>
            </form>
        </div>
    </div>

    <!-- COUNTERPARTY -->
    <div id="modal-counterparty" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div id="modal-counterparty-content" class="glass-panel w-full max-w-sm p-6 rounded-2xl border border-slate-800 scale-95 transition-all">
            <div class="flex justify-between items-center mb-6"><h3 id="modal-cp-title" class="text-lg font-bold text-white">Nueva contraparte</h3><button onclick="closeCounterpartyModal()" class="p-1.5 text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <form id="counterparty-form" onsubmit="saveCounterparty(event)" class="space-y-4">
                <input type="hidden" id="cp-id">
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Nombre</label><input id="cp-nombre" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Banco</label><input id="cp-banco" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Nº cuenta</label><input id="cp-cuenta" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Notas</label><textarea id="cp-notas" rows="2" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></textarea></div>
                <div class="flex gap-3"><button type="button" onclick="closeCounterpartyModal()" class="flex-1 py-2.5 border border-slate-700 rounded-xl text-sm">Cancelar</button><button type="submit" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Guardar</button></div>
            </form>
        </div>
    </div>

    <!-- CATEGORY -->
    <div id="modal-category" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div id="modal-category-content" class="glass-panel w-full max-w-sm p-6 rounded-2xl border border-slate-800 scale-95 transition-all">
            <div class="flex justify-between items-center mb-6"><h3 id="modal-cat-title" class="text-lg font-bold text-white">Categoría</h3><button onclick="closeCategoryModal()" class="p-1.5 text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <form id="category-form" onsubmit="saveCategory(event)" class="space-y-4">
                <input type="hidden" id="cat-id">
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Nombre</label><input id="cat-nombre" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Descripción</label><input id="cat-descripcion" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="flex gap-3"><button type="button" onclick="closeCategoryModal()" class="flex-1 py-2.5 border border-slate-700 rounded-xl text-sm">Cancelar</button><button type="submit" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Guardar</button></div>
            </form>
        </div>
    </div>

    <!-- SUBCATEGORY -->
    <div id="modal-subcategory" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all">
        <div id="modal-subcategory-content" class="glass-panel w-full max-w-sm p-6 rounded-2xl border border-slate-800 scale-95 transition-all">
            <div class="flex justify-between items-center mb-6"><h3 id="modal-sub-title" class="text-lg font-bold text-white">Subcategoría</h3><button onclick="closeSubcategoryModal()" class="p-1.5 text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button></div>
            <form id="subcategory-form" onsubmit="saveSubcategory(event)" class="space-y-4">
                <input type="hidden" id="sub-id">
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Categoría</label><select id="sub-category-id" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></select></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Nombre</label><input id="sub-nombre" required class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="space-y-1.5"><label class="text-xs font-semibold text-slate-400">Descripción</label><input id="sub-descripcion" class="glass-input w-full px-3 py-2.5 rounded-xl text-sm"></div>
                <div class="flex gap-3"><button type="button" onclick="closeSubcategoryModal()" class="flex-1 py-2.5 border border-slate-700 rounded-xl text-sm">Cancelar</button><button type="submit" class="flex-1 py-2.5 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl text-sm font-semibold">Guardar</button></div>
            </form>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
